project:
  name: Savastano Advisory
  public_identity: Bruno Savastano
  brand: Savastano Advisory
  domain: savastanoadvisory.com.br
  cvm_code: '004503-0'
  language: pt-BR
  independence_mode: hard
  legacy_dependency_allowed: false

agents:
  orchestrator: Zeus
  builder: Vulcanus
  additional_openclaws_allowed_before_t3: false

state:
  active_tranche: T8
  tranche_status: done
  stage_gate: deploy_done
  release_mode: shadow
  prod_ready: true

deferred:
  postgres_migration:
    status: deferred_to_v2
    reason: SQLite handles V1 scale (1 operator, <10 clients, 1 process). PG needed when any of these triggers fire.
    triggers:
      - second_operator_added
      - client_count_exceeds_20
      - horizontal_scaling_needed
      - concurrent_write_errors_observed
    plan: docs/postgres-migration.md

stack:
  frontend: Next.js
  ui: React
  language: TypeScript
  database_dev: SQLite
  database_prod: SQLite_v1_then_PostgreSQL
  jobs: Node_and_bash
  deploy: independent
  hosting: isolated
  storage: independent
  auth: project_local
  billing: recurring_required
  locale: pt-BR

rules:
  share_repo_with_vlh: false
  share_db_with_vlh: false
  share_workflows_with_vlh: false
  share_deploy_with_vlh: false
  share_identity_with_vlh: false
  share_secrets_with_vlh: false
  public_brand_is_agentic: false

evidence:
  required_per_tranche:
    - code_or_config
    - screenshot_or_log
    - test_or_manual_verification
    - state_update
