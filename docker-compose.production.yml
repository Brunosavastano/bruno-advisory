# Savastano Advisory — production stack
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savastano-advisory-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - APP_BASE_URL=https://savastanoadvisory.com.br
      - COCKPIT_SECRET=${COCKPIT_SECRET}
      - DATABASE_PROVIDER=sqlite
      # AI gateway (AI-1 Cycle 2). Values come from /home/savastano-advisory/.env on the host.
      - AI_ENABLED=${AI_ENABLED:-false}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-6}
      - AI_USE_MOCK=${AI_USE_MOCK:-0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_DEV_HARNESS_ENABLED=${AI_DEV_HARNESS_ENABLED:-0}
    volumes:
      - app-data:/data
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: savastano-advisory-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  app-data:
    name: savastano-advisory-data
  caddy-data:
    name: savastano-advisory-caddy-data
  caddy-config:
    name: savastano-advisory-caddy-config

networks:
  web:
    name: savastano-advisory-web
